<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NettMedia AI - Dual Model Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .model-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .model-btn {
            padding: 15px 40px;
            border: 2px solid #333;
            background: transparent;
            color: #888;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .model-btn.active {
            border-color: #00d9ff;
            color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }
        
        .model-btn:hover:not(.active) {
            border-color: #555;
            color: #aaa;
        }
        
        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
        }
        
        .message.user {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #000;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .message.assistant {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }
        
        .message.model-minimax {
            border-left: 3px solid #ff6b6b;
        }
        
        .message.model-xiaomi {
            border-left: 3px solid #00d9ff;
        }
        
        .model-badge {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: background 0.3s;
        }
        
        .chat-input:focus {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .chat-input::placeholder {
            color: #666;
        }
        
        .send-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            max-width: 80%;
        }
        
        .typing-dots {
            display: flex;
            gap: 5px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 0.85rem;
        }
        
        footer a {
            color: #00d9ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NettMedia AI</h1>
            <p class="subtitle">Two AI models. One chat. Pick your brain.</p>
        </header>
        
        <div class="model-selector">
            <button class="model-btn active" data-model="minimax/MiniMax-M2.7">
                MiniMax M2.7
            </button>
            <button class="model-btn" data-model="xiaomi/mimo-v2-flash">
                Xiaomi Mimo
            </button>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <strong>Two models, twice the insight.</strong> MiniMax M2.7 for deep reasoning, Xiaomi Mimo V2 Flash for fast, casual responses. Switch anytime — compare answers, explore differences, find your rhythm.
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Type your message..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <footer>
            <p>NettMedia AI — Built with OpenClaw · <a href="https://nettmedia.de">nettmedia.de</a></p>
        </footer>
    </div>
    
    <script>
        let currentModel = 'minimax/MiniMax-M2.7';
        let gatewayUrl = 'ws://localhost:18789';
        let authToken = '';
        let ws = null;
        let messageId = 0;
        
        // Model selector
        document.querySelectorAll('.model-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentModel = btn.dataset.model;
            });
        });
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function addMessage(content, role, model = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            if (model) {
                msgDiv.classList.add(`model-${model.includes('minimax') ? 'minimax' : 'xiaomi'}`);
                const badge = document.createElement('div');
                badge.className = 'model-badge';
                badge.textContent = model;
                msgDiv.appendChild(badge);
            }
            
            msgDiv.appendChild(document.createTextNode(content));
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping(show) {
            document.getElementById('typingIndicator').style.display = show ? 'block' : 'none';
        }
        
        function setInputEnabled(enabled) {
            document.getElementById('chatInput').disabled = !enabled;
            document.getElementById('sendBtn').disabled = !enabled;
        }
        
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            
            if (!content) return;
            
            addMessage(content, 'user');
            input.value = '';
            showTyping(true);
            setInputEnabled(false);
            
            try {
                const response = await fetch(`${gatewayUrl}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{ role: 'user', content }],
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || 'No response';
                addMessage(reply, 'assistant', currentModel);
                
            } catch (error) {
                addMessage(`Error: ${error.message}. Make sure OpenClaw gateway is running.`, 'assistant');
            } finally {
                showTyping(false);
                setInputEnabled(true);
            }
        }
    </script>
</body>
</html>
